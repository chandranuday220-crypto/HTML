<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Newsletter Signup</title>
</head>
<body>
    

    <form>
        <fieldset>
        <legend>Newsletter Signup</legend>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="full name" required><br><br>
        
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="email address" required><br><br>
        <input type="checkbox" id="checkbox" name="checkbox" required>
        <label for="checkbox">I agree to the terms and conditions</label><br><br>
        <input type="submit" value="Submit">
        </fieldset>
    </form>

</body>
</html>
