<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us-Flower Bed</title>
</head>
<body>
    <h1>Flower Bed</h1>
    <h4>we'd love to hear from you!</h4>
    <form>
        <fieldset>
            <h2>Contact Us</h2>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="full name" required><br><br>
        
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="email address" required><br><br>
        <label for="Phone">Phone Number:</label>
        <input type="tel" id="phone" name="phone" maxlength="10" placeholder="phone number" required><br><br>
        <label for="subject">Subject:</label><br>
        <input type="text" id="subject" name="subject" placeholder="subject" required><br><br>
        <label for="message">Message:</label><br>
        <textarea id="message" name="message" placeholder="your message here" required></textarea><br><br>
        <input type="checkbox" id="checkbox" name="checkbox" required>
        <label for="checkbox">I agree to the terms and conditions</label><br><br>
        <input type="submit" value="Submit">
        </fieldset>
    </form>
    <p>&copy; 2023 Flower Bed. All rights reserved.</p>

</body>
</html>
