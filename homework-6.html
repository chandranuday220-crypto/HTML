<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Card</title>
  <style>
    body {
      font-family:'Times New Roman', Times, serif
      background-color: burlywood;
 }
.card {
  padding: 5px;
  margin: 5px auto;
  width: 50%;
}
  </style>
</head>
<body>
  <div class ="card" min-width="100px"
   max-width="300px" height="300px" 
   style="border: 2px solid #787777; 
   border-radius: 12px; padding: 10px; margin: 40px auto;
    background-color: rgb(154, 122, 122); 
    text-align: center;">
  
    <legend>Product Card</legend>
    <img src="https://media.wired.com/photos/6827aa9a230796724968cb4d/16:9/w_1200,h_675,c_limit/Best%20Wireless%20Headphones%20Update_.png"
     height="250px" 
     width="250px" 
     alt="Product Image"
     style="border-radius: 8px;">
    <h2>Wireless Headphones</h2>
    <p>
      High-quality wireless headphones with clear sound,
      comfortable design, and long battery life.
    </p>
  
  </div>
</body>
</html>
